<!doctype html>
<html lang="en" data-bs-theme="dark">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>COCO YouTube Overlay</title>
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
    />
  </head>
  <body class="bg-dark text-light p-3">
    <p
      class="text-uppercase text-secondary small mb-3"
      style="letter-spacing: 0.1em"
    >
      COCO / YouTube Overlay
    </p>

    <div class="d-flex align-items-center gap-2 mb-2">
      <label class="text-secondary small" style="min-width: 110px"
        >YouTube URL</label
      >
      <input
        id="yt-url"
        type="text"
        class="form-control form-control-sm bg-black text-light border-secondary"
        value="https://youtu.be/6Miv3OV_XnY"
      />
    </div>
    <div class="d-flex align-items-center gap-2 mb-2">
      <label class="text-secondary small" style="min-width: 110px"
        >COCO JSON URL</label
      >
      <input
        id="json-url"
        type="text"
        class="form-control form-control-sm bg-black text-light border-secondary"
        value="https://raw.githubusercontent.com/ivan006/2026-04-spatial-awareness-for-football-using-fiftyone/refs/heads/main/dataset/test/train/_annotations.coco.json"
      />
    </div>
    <div class="d-flex align-items-center gap-2 mb-2">
      <label class="text-secondary small" style="min-width: 110px">FPS</label>
      <input
        id="fps"
        type="number"
        value="30"
        min="1"
        max="60"
        class="form-control form-control-sm bg-black text-light border-secondary"
        style="max-width: 80px"
      />
      <div class="form-check ms-2 mb-0">
        <input
          class="form-check-input"
          type="checkbox"
          id="show-labels"
          checked
        />
        <label class="form-check-label small text-secondary" for="show-labels"
          >Labels</label
        >
      </div>
      <button id="load-btn" class="btn btn-sm btn-light ms-auto">Load</button>
    </div>

    <!-- Video reference size (pixels) — defaults to standard 1280x720 YT -->
    <div class="d-flex align-items-center gap-2 mb-2">
      <label class="text-secondary small" style="min-width: 110px"
        >Video width px</label
      >
      <input
        id="ref-w"
        type="number"
        value="1280"
        min="1"
        class="form-control form-control-sm bg-black text-light border-secondary"
        style="max-width: 90px"
      />
      <label class="text-secondary small ms-3" style="min-width: 110px"
        >Video height px</label
      >
      <input
        id="ref-h"
        type="number"
        value="720"
        min="1"
        class="form-control form-control-sm bg-black text-light border-secondary"
        style="max-width: 90px"
      />
    </div>

    <p id="status" class="text-secondary small mb-2">
      Enter URLs above then click Load.
    </p>

    <!-- Playback controls -->
    <div id="ctrl-bar" class="d-none d-flex align-items-center gap-2 mb-2">
      <button id="play-btn" class="btn btn-sm btn-outline-light">Play</button>
      <button id="pause-btn" class="btn btn-sm btn-outline-light">Pause</button>
      <input
        type="range"
        id="seek"
        min="0"
        max="100"
        value="0"
        step="0.1"
        class="form-range flex-grow-1"
      />
      <span
        id="frame-info"
        class="text-secondary small"
        style="white-space: nowrap"
        >frame —</span
      >
    </div>

    <!-- Legend -->
    <div id="legend" class="d-flex flex-wrap gap-2 mb-2"></div>

    <!-- Video -->
    <div
      id="video-wrap"
      class="d-none position-relative w-100 bg-black rounded"
      style="height: 720px"
    >
      <div
        id="player"
        style="position: absolute; top: 0; left: 0; width: 100%; height: 100%"
      ></div>
      <canvas
        id="overlay"
        style="
          position: absolute;
          top: 0;
          left: 0;
          width: 100%;
          height: 100%;
          pointer-events: none;
          border: 2px dashed rgba(255, 255, 255, 0.4);
          box-sizing: border-box;
        "
      ></canvas>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/jquery@3.7.1/dist/jquery.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script>
      const COLORS = [
        "#e74c3c",
        "#3498db",
        "#2ecc71",
        "#f39c12",
        "#9b59b6",
        "#1abc9c",
        "#e67e22",
        "#34495e",
        "#e91e63",
        "#00bcd4",
      ];
      let player,
        cocoData,
        annsByFrame = {},
        catMap = {},
        colorMap = {},
        fps = 30;
      let ytReady = false,
        seeking = false,
        rafId = null;

      function setStatus(msg) {
        $("#status").text(msg);
      }

      window.onYouTubeIframeAPIReady = function () {
        ytReady = true;
      };
      $("<script>")
        .attr("src", "https://www.youtube.com/iframe_api")
        .appendTo("head");

      function extractVideoId(url) {
        const m = url.match(/(?:v=|youtu\.be\/)([A-Za-z0-9_-]{11})/);
        return m ? m[1] : null;
      }

      function parseFrameFromFilename(filename) {
        const roboflow = filename.match(/mp4-(\d+)/i);
        if (roboflow) return parseInt(roboflow[1], 10);
        const generic = filename.match(/(\d+)(?:\.[^.]+)?$/);
        if (generic) return parseInt(generic[1], 10);
        return 0;
      }

      function buildFrameMap(data) {
        annsByFrame = {};
        catMap = {};
        colorMap = {};
        fps = parseFloat($("#fps").val()) || 30;
        $.each(data.categories || [], (_, c) => {
          catMap[c.id] = c.name;
        });
        $.each(Object.values(catMap), (i, c) => {
          colorMap[c] = COLORS[i % COLORS.length];
        });
        const imgMap = {};
        $.each(data.images || [], (_, img) => {
          const fname = img.extra?.name || img.file_name || "";
          imgMap[img.id] = parseFrameFromFilename(fname);
        });
        $.each(data.annotations || [], (_, a) => {
          const f =
            imgMap[a.image_id] != null ? imgMap[a.image_id] : a.image_id;
          if (!annsByFrame[f]) annsByFrame[f] = [];
          annsByFrame[f].push(a);
        });
        buildLegend();
      }

      function buildLegend() {
        const $leg = $("#legend").empty();
        $.each(colorMap, (name, col) => {
          $leg.append(
            $("<span>")
              .addClass("small text-secondary d-flex align-items-center gap-1")
              .append(
                $("<span>").css({
                  width: "10px",
                  height: "10px",
                  background: col,
                  borderRadius: "2px",
                  display: "inline-block",
                }),
                document.createTextNode(name),
              ),
          );
        });
      }

      function drawFrame(frameIdx) {
        const canvas = document.getElementById("overlay");
        const wrap = document.getElementById("video-wrap");
        canvas.width = wrap.offsetWidth;
        canvas.height = wrap.offsetHeight;
        const ctx = canvas.getContext("2d");
        ctx.clearRect(0, 0, canvas.width, canvas.height);

        let anns = annsByFrame[frameIdx];
        if (!anns) {
          for (let d = 1; d <= 2; d++) {
            if (annsByFrame[frameIdx - d]) {
              anns = annsByFrame[frameIdx - d];
              break;
            }
            if (annsByFrame[frameIdx + d]) {
              anns = annsByFrame[frameIdx + d];
              break;
            }
          }
        }
        if (!anns || !anns.length) {
          $("#frame-info").text(`frame ${frameIdx}`);
          return;
        }

        const showLabels = $("#show-labels").is(":checked");
        const refW = parseFloat($("#ref-w").val()) || 1280;
        const refH = parseFloat($("#ref-h").val()) || 720;
        const scaleX = canvas.width / refW;
        const scaleY = canvas.height / refH;

        $.each(anns, (_, a) => {
          const cat = catMap[a.category_id] || String(a.category_id);
          const col = colorMap[cat] || "#fff";
          ctx.strokeStyle = col;
          ctx.lineWidth = 2;
          if (a.bbox) {
            const [x, y, w, h] = a.bbox;
            ctx.fillStyle = col + "28";
            ctx.fillRect(x * scaleX, y * scaleY, w * scaleX, h * scaleY);
            ctx.strokeRect(x * scaleX, y * scaleY, w * scaleX, h * scaleY);
            if (showLabels) {
              const fs = Math.max(
                11,
                Math.round(12 * Math.min(scaleX, scaleY)),
              );
              ctx.font = `bold ${fs}px monospace`;
              ctx.fillStyle = col;
              const ty = y * scaleY > 14 ? y * scaleY - 4 : y * scaleY + fs + 2;
              ctx.fillText(cat, x * scaleX + 3, ty);
            }
          }
          if (Array.isArray(a.segmentation) && a.segmentation.length) {
            const segs = Array.isArray(a.segmentation[0])
              ? a.segmentation
              : [a.segmentation];
            $.each(segs, (_, seg) => {
              if (!Array.isArray(seg) || seg.length < 6) return;
              ctx.beginPath();
              ctx.moveTo(seg[0] * scaleX, seg[1] * scaleY);
              for (let i = 2; i < seg.length; i += 2)
                ctx.lineTo(seg[i] * scaleX, seg[i + 1] * scaleY);
              ctx.closePath();
              ctx.fillStyle = col + "44";
              ctx.fill();
              ctx.stroke();
            });
          }
        });

        $("#frame-info").text(`frame ${frameIdx} · ${anns.length} ann`);
      }

      function tick() {
        if (!player || typeof player.getCurrentTime !== "function") {
          rafId = requestAnimationFrame(tick);
          return;
        }
        const t = player.getCurrentTime();
        drawFrame(Math.round(t * fps));
        if (!seeking) $("#seek").val((t / (player.getDuration() || 1)) * 100);
        rafId = requestAnimationFrame(tick);
      }

      $("#load-btn").on("click", function () {
        const ytUrl = $("#yt-url").val().trim();
        const jsonUrl = $("#json-url").val().trim();
        if (!ytUrl || !jsonUrl) {
          setStatus("Please fill in both URLs.");
          return;
        }
        const vid = extractVideoId(ytUrl);
        if (!vid) {
          setStatus("Could not parse YouTube video ID.");
          return;
        }
        setStatus("Fetching COCO JSON...");
        $.getJSON(jsonUrl)
          .done((data) => {
            cocoData = data;
            buildFrameMap(data);
            const frameNums = Object.keys(annsByFrame)
              .map(Number)
              .sort((a, b) => a - b);
            setStatus(
              `Loaded ${(data.annotations || []).length} annotations · ${frameNums.length} frames · range ${frameNums[0]}–${frameNums[frameNums.length - 1]}`,
            );
            $("#ctrl-bar").removeClass("d-none");
            $("#video-wrap").removeClass("d-none");
            fps = parseFloat($("#fps").val()) || 30;
            const tryInit = () => {
              if (!ytReady || typeof YT === "undefined") {
                setTimeout(tryInit, 200);
                return;
              }
              if (player) player.destroy();
              player = new YT.Player("player", {
                videoId: vid,
                playerVars: { controls: 1, rel: 0, modestbranding: 1 },
                events: {
                  onReady: () => {
                    if (rafId) cancelAnimationFrame(rafId);
                    tick();
                  },
                },
              });
            };
            tryInit();
          })
          .fail((_, __, err) => setStatus("Failed to load JSON: " + err));
      });

      $("#play-btn").on("click", () => player && player.playVideo());
      $("#pause-btn").on("click", () => player && player.pauseVideo());
      $("#seek")
        .on("mousedown", () => {
          seeking = true;
        })
        .on("input", function () {
          if (!player || typeof player.getDuration !== "function") return;
          const t = ($(this).val() / 100) * player.getDuration();
          player.seekTo(t, true);
          drawFrame(Math.round(t * fps));
        })
        .on("mouseup", () => {
          seeking = false;
        });
    </script>
  </body>
</html>
